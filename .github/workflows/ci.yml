name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build Worker
        run: npm run build

  ios:
    name: iOS Simulator build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Build unsigned iOS app
        run: >-
          xcodebuild
          -project ios/Bellwire/Bellwire.xcodeproj
          -scheme Bellwire
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          build
