# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  worker:
    name: Validate Worker and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test Worker and shared code
        run: npm run test:worker
      - name: Build Worker
        run: npm run build

  ios:
    name: Validate iOS Simulator build
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test iOS helpers
        run: npm run test:ios
      - name: Build unsigned iOS app
        run: >-
          xcodebuild
          -project ios/Bellwire/Bellwire.xcodeproj
          -scheme Bellwire
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          build

  publish:
    name: Publish GitHub release
    needs:
      - worker
      - ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Package Agent Skill
        run: |
          cd skills
          zip -r "../bellwire-skill-${GITHUB_REF_NAME}.zip" bellwire
          cd ..
          sha256sum "bellwire-skill-${GITHUB_REF_NAME}.zip" > "bellwire-skill-${GITHUB_REF_NAME}.zip.sha256"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --verify-tag
          --title "Bellwire $GITHUB_REF_NAME"
          --generate-notes
          "bellwire-skill-${GITHUB_REF_NAME}.zip"
          "bellwire-skill-${GITHUB_REF_NAME}.zip.sha256"
