name: Bug report
description: Report a reproducible Bellwire problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private user data, or security vulnerabilities. Follow SECURITY.md for private reports.
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Bellwire Cloud
        - Self-hosted
        - Local development
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - iOS app
        - Worker API
        - Supabase migrations
        - APNs delivery
        - Agent skill or CLI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest deterministic sequence that reproduces the issue.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove tokens, keys, email addresses, device tokens, and private payloads.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and personal data from this report.
          required: true
        - label: This is not a security vulnerability that should be reported privately.
          required: true
