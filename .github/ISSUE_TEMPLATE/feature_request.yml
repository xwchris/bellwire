name: Feature request
description: Propose a focused Bellwire improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Bellwire Cloud user
        - Self-hosted user
        - Agent or integration author
        - Contributor or maintainer
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem before proposing an implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the smallest useful outcome and relevant tradeoffs.
    validations:
      required: true
  - type: textarea
    id: self_hosting
    attributes:
      label: Self-hosting impact
      description: Note any new cloud resources, secrets, migrations, Apple capabilities, or compatibility changes.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I searched existing issues for the same request.
          required: true
        - label: I have not included private product plans or credentials.
          required: true
